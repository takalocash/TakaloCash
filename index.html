<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakaloCash</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="loginPage">
    <div class="card">
        <h2 style="text-align: center; color: #0d6efd;">TakaloCash</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Teny miafina">
        <hr>
        <p style="font-size: 0.8em; color: #666;">Raha mbola tsy manana kaonty:</p>
        <input type="text" id="nom" placeholder="Anarana feno">
        <input type="text" id="telephone" placeholder="Laharana finday">
        <button onclick="signup()" style="background-color: #6c757d; color: white;">Hamorona kaonty</button>
        <hr>
        <button onclick="login()" style="background-color: #0d6efd; color: white;">Hiditra (Connexion)</button>
    </div>
</div>

<div class="container" id="dashboard" style="display:none;">
    <div class="header">
        <h2>TakaloCash</h2>
        <div class="icons">
            <span title="Notifications">🔔</span>
            <span onclick="logout()" title="Hivoaka">✕</span>
        </div>
    </div>

    <div class="card" style="text-align: center;">
        <img id="profilePic" src="https://via.placeholder.com/60" alt="Profil">
        <input type="file" id="photo" style="display:none;" onchange="uploadPhoto()">
        <button onclick="document.getElementById('photo').click()" style="width: auto; padding: 5px 10px; font-size: 0.7em;">Hanova sary</button>
        <h3 id="profilNom">...</h3>
        <p id="profilTelephone" style="color: #666;"></p>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 5px;">Solde disponible</h3>
        <h1 id="solde">0 Ar</h1>
        <div class="btns" style="display: flex; gap: 10px;">
            <button class="send" onclick="envoyer()">Handefa</button>
            <button class="receive" onclick="recevoir()">Handray</button>
        </div>
    </div>

    <div class="services">
        <button class="crypto" onclick="alert('Crypto')">Crypto</button>
        <button class="wallet" onclick="alert('Wallet')">Wallet</button>
        <button class="starlink" onclick="alert('Starlink')">Starlink</button>
        <button class="xbet" onclick="alert('1xBet')">1xBet</button>
    </div>

    <div class="card">
        <h3>Historique</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Daty</th>
                        <th>Service</th>
                        <th>Type</th>
                        <th>Montant</th>
                        <th>Réf</th>
                    </tr>
                </thead>
                <tbody id="transactionBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3>Notifications</h3>
        <ul id="notificationList"></ul>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
